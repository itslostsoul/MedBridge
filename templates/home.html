<!DOCTYPE html>
<html>
<head>
    <title>MedBridge - Home</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='med-logo.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #FCF5F5;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M25 15 h10 v10 h10 v10 h-10 v10 h-10 v-10 h-10 v-10 h10 z' fill='%23B71C1C' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E"),
                radial-gradient(circle at center, #ffffff 0%, #FCF5F5 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: transparent; }
        .brand-section { display: flex; align-items: center; gap: 10px; }
        .brand-text { font-size: 24px; font-weight: 800; color: #B71C1C; }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        .leaf-icon { height: 25px; width: auto; animation: floating 3s ease-in-out infinite; }

        .leaderboard-link {
            display: flex; align-items: center; gap: 10px; font-size: 18px; color: #B71C1C;
            font-weight: bold; text-decoration: none; background-color: white; padding: 10px 20px;
            border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.2s; border: 1px solid #e0e0e0;
        }
        .leaderboard-link:hover { transform: scale(1.05); background-color: #FFEBEE; }

        .main-content {
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; text-align: center; gap: 10px; margin-bottom: 100px; 
        }

        .content-wrap { padding: 40px; border-radius: 30px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .big-title { font-size: 60px; font-weight: 800; color: #B71C1C; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0; }
        .subtitle { font-size: 24px; color: #B71C1C; font-weight: 500; margin-bottom: 40px; }
        .buttons-container { display: flex; gap: 30px; justify-content: center; }
        .btn-custom { padding: 15px 40px; border-radius: 50px; font-weight: bold; font-size: 16px; border: none; transition: transform 0.2s, box-shadow 0.2s; }
        .btn-custom:hover { transform: scale(1.05); }
        .btn-surplus { background-color: #C62828; color: white; box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3); }
        .btn-need { background-color: #FFCDD2; color: #B71C1C; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand-section">
            <span class="brand-text">MedBridge</span>
            <img class="leaf-icon" src="{{ url_for('static', filename='med-logo.png') }}">
        </div>
        
        <a href="{{ url_for('leaderboard') }}" class="leaderboard-link">
            <span>Leaderboard 🏆</span>
        </a>
    </div>

    <div class="main-content">
        <div class="content-wrap">
            <div class="big-title">MEDBRIDGE</div>
            <div class="subtitle">Securing the Lifeline Between Surplus Medication & Healthcare Access</div>
            
            <div class="buttons-container">
                <a href="{{ url_for('dashboard', mode='donor') }}">
                    <button class="btn-custom btn-surplus">I have surplus medication</button>
                </a>
                
                <a href="{{ url_for('dashboard', mode='recipient') }}">
                    <button class="btn-custom btn-need">I represent a clinic</button>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
